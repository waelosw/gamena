<head>

  <title>Cave Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      font-family: 'Georgia', serif;
    }
    #game-root {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
    #hud {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    /* Vignette effect */
    #vignette {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
      pointer-events: none;
    }
    /* Torch flicker overlay */
    #flicker {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 140, 20, 0);
      mix-blend-mode: overlay;
      pointer-events: none;
      animation: flicker 0.12s infinite alternate;
    }
    @keyframes flicker {
      0%   { opacity: 0.04; }
      25%  { opacity: 0.02; }
      50%  { opacity: 0.06; }
      75%  { opacity: 0.01; }
      100% { opacity: 0.05; }
    }
    /* Crosshair */
    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 16px; height: 16px;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,200,100,0.5);
      border-radius: 2px;
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }

    /* Hand torch container */
    #torch-hand {
      position: absolute;
      bottom: -20px;
      right: 60px;
      width: 220px;
      height: 320px;
      pointer-events: none;
      z-index: 20;
      transform-origin: bottom center;
      animation: torchSway 3.5s ease-in-out infinite;
    }
    @keyframes torchSway {
      0%   { transform: rotate(-2deg) translateY(0px); }
      30%  { transform: rotate(1.5deg) translateY(-4px); }
      60%  { transform: rotate(-1deg) translateY(2px); }
      100% { transform: rotate(-2deg) translateY(0px); }
    }
    #torch-hand svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 18px rgba(255, 160, 40, 0.9)) drop-shadow(0 0 40px rgba(255, 100, 10, 0.5));
    }

    /* Torch flame glow on screen */
    #torch-glow {
      position: absolute;
      bottom: 240px;
      right: 90px;
      width: 120px;
      height: 120px;
      background: radial-gradient(ellipse, rgba(255,180,40,0.35) 0%, rgba(255,80,0,0.1) 50%, transparent 75%);
      pointer-events: none;
      z-index: 18;
      animation: glowPulse 0.18s ease-in-out infinite alternate;
      border-radius: 50%;
    }
    @keyframes glowPulse {
      0%   { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.18); opacity: 1; }
    }

    /* Flame particles */
    .flame-particle {
      position: absolute;
      border-radius: 50% 50% 30% 30%;
      pointer-events: none;
      z-index: 19;
      mix-blend-mode: screen;
      animation: riseFlame linear infinite;
    }
    @keyframes riseFlame {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(0.2); }
    }

    /* Start screen */
    #start-screen {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      color: #e8c07a;
    }
    #start-screen h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      text-shadow: 0 0 30px rgba(255,160,40,0.8), 0 0 60px rgba(255,80,0,0.4);
      letter-spacing: 0.2em;
      margin-bottom: 1rem;
      animation: titleGlow 2s ease-in-out infinite alternate;
    }
    @keyframes titleGlow {
      from { text-shadow: 0 0 20px rgba(255,160,40,0.6); }
      to   { text-shadow: 0 0 40px rgba(255,160,40,1), 0 0 80px rgba(255,80,0,0.5); }
    }
    #start-screen p {
      font-size: 1rem;
      color: #a08050;
      margin: 0.3rem 0;
      letter-spacing: 0.05em;
    }
    #start-btn {
      margin-top: 2rem;
      padding: 1rem 3rem;
      background: transparent;
      border: 2px solid #e8c07a;
      color: #e8c07a;
      font-size: 1.2rem;
      font-family: 'Georgia', serif;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.3s;
    }
    #start-btn:hover {
      background: rgba(232,192,122,0.15);
      box-shadow: 0 0 20px rgba(232,192,122,0.4);
    }
    .controls-grid {
      display: grid;
      grid-template-columns: auto auto;
      gap: 0.4rem 1.5rem;
      margin: 1rem 0;
    }
    .key {
      background: rgba(232,192,122,0.1);
      border: 1px solid rgba(232,192,122,0.3);
      padding: 0.2rem 0.6rem;
      font-size: 0.9rem;
      text-align: center;
    }
    .key-label { font-size: 0.9rem; color: #907040; }
    #depth-indicator {
      position: absolute;
      top: 20px;

      color: rgba(232,192,122,0.7);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-shadow: 0 0 10px rgba(255,160,40,0.5);
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  // ─── GLOBALS ───────────────────────────────────────────────────────────────
  let scene, camera, renderer, clock;
  let keys = {};
  let yaw = 0, pitch = 0;
  let isLocked = false;
  let torchLight, ambientLight, pointLight2;
  let caveGroup;
  let startTime = 0;
  let depthZ = 0;

  // ─── NOISE ─────────────────────────────────────────────────────────────────
  // Simple Perlin-like noise using hash
  function hash(n) {
    let x = Math.sin(n) * 43758.5453123;
    return x - Math.floor(x);
  }
  function noise3(x, y, z) {
    const ix = Math.floor(x), iy = Math.floor(y), iz = Math.floor(z);
    const fx = x - ix, fy = y - iy, fz = z - iz;
    const ux = fx*fx*(3-2*fx), uy = fy*fy*(3-2*fy), uz = fz*fz*(3-2*fz);
    const a = hash(ix + hash(iy + hash(iz)));
    const b = hash(ix+1 + hash(iy + hash(iz)));
    const c = hash(ix + hash(iy+1 + hash(iz)));
    const d = hash(ix+1 + hash(iy+1 + hash(iz)));
    const e = hash(ix + hash(iy + hash(iz+1)));
    const f = hash(ix+1 + hash(iy + hash(iz+1)));
    const g = hash(ix + hash(iy+1 + hash(iz+1)));
    const h = hash(ix+1 + hash(iy+1 + hash(iz+1)));
    return a + (b-a)*ux + (c-a)*uy + (d-b-c+a)*ux*uy +
           (e-a + (a-b-e+f)*ux + (a-c-e+g)*uy + (b+c+e-a-d-f-g+h)*ux*uy)*uz;
  }
  function fbm(x, y, z, octaves=6) {
    let v=0, amp=0.5, freq=1, max=0;
    for(let i=0;i<octaves;i++){
      v += amp * noise3(x*freq, y*freq, z*freq);
      max += amp; amp*=0.5; freq*=2;
    }
    return v/max;
  }

  // ─── CAVE GEOMETRY ─────────────────────────────────────────────────────────
  function createCaveGeometry(segments, radius, length) {
    const shape = new THREE.Shape();
    const pts = 20;
    for(let i=0;i<=pts;i++){
      const a = (i/pts)*Math.PI*2;
      const r = radius + radius*0.3*Math.sin(a*2.3+0.5) + radius*0.15*Math.sin(a*4.1+1.2);
      const px = Math.cos(a)*r, py = Math.sin(a)*r;
      i===0 ? shape.moveTo(px,py) : shape.lineTo(px,py);
    }
    const path = new THREE.CatmullRomCurve3([]);
    const pathPts = [];
    for(let i=0;i<=segments;i++){
      const t=i/segments;
      const wx = fbm(t*3,0,0)*8 - 4;
      const wy = fbm(0,t*3,1)*4 - 2;
      pathPts.push(new THREE.Vector3(wx, wy, -t*length));
    }
    const extrudePath = new THREE.CatmullRomCurve3(pathPts);
    const extrudeSettings = {
      steps: segments*3,
      extrudePath: extrudePath,
      bevelEnabled: false
    };
    return new THREE.ExtrudeGeometry(shape, extrudeSettings);
  }

  // ─── ROCK MATERIAL ─────────────────────────────────────────────────────────
  function createRockMaterial(color=0x3a3028, roughness=0.95, metalness=0.05) {
    return new THREE.MeshStandardMaterial({
      color,
      roughness,
      metalness,
      side: THREE.BackSide,
      envMapIntensity: 0.2
    });
  }

  function createStoneMaterial() {
    return new THREE.MeshStandardMaterial({
      color: 0x2a2520,
      roughness: 0.98,
      metalness: 0.02,
      side: THREE.FrontSide
    });
  }

  // ─── STALACTITE ────────────────────────────────────────────────────────────
  function addStalactite(group, x, y, z, scale, inverted) {
    const geo = new THREE.ConeGeometry(0.1*scale, 0.6*scale + Math.random()*0.8*scale, 5+Math.floor(Math.random()*3));
    const mat = createStoneMaterial();
    mat.color.setHex(0x1e1a16 + Math.floor(Math.random()*0x101010));
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    if(inverted) { mesh.rotation.z = Math.PI; }
    mesh.rotation.y = Math.random()*Math.PI*2;
    group.add(mesh);
    // Add mineral glitter on some
    if(Math.random()<0.15) {
      const geoG = new THREE.SphereGeometry(0.02*scale, 4, 4);
      const matG = new THREE.MeshStandardMaterial({color:0xaaaaaa, roughness:0.1, metalness:0.9, emissive:0x222222});
      for(let i=0;i<3;i++){
        const g = new THREE.Mesh(geoG, matG);
        g.position.set(x+Math.random()*0.05-0.025, y+Math.random()*0.2*scale-0.1*scale, z+Math.random()*0.05-0.025);
        group.add(g);
      }
    }
  }

  // ─── BOULDER ───────────────────────────────────────────────────────────────
  function addBoulder(group, x, y, z, scale) {
    const geos = [
      new THREE.DodecahedronGeometry(scale, 1),
      new THREE.IcosahedronGeometry(scale, 1),
      new THREE.OctahedronGeometry(scale, 2)
    ];
    const geo = geos[Math.floor(Math.random()*geos.length)];
    // Perturb vertices for organic look
    const pos = geo.attributes.position;
    for(let i=0;i<pos.count;i++){
      const ox=pos.getX(i), oy=pos.getY(i), oz=pos.getZ(i);
      const n = fbm(ox*2+x*0.1, oy*2+y*0.1, oz*2+z*0.1)*0.4+0.8;
      pos.setXYZ(i, ox*n, oy*n, oz*n);
    }
    geo.computeVertexNormals();
    const hue = 0x1a1510 + Math.floor(Math.random()*0x151010);
    const mat = new THREE.MeshStandardMaterial({color: hue, roughness:0.97, metalness:0.03});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);
  }

  // ─── ROCK WALL DETAIL ──────────────────────────────────────────────────────
  function addWallRocks(group) {
    for(let z=2; z<120; z+=3.5) {
      const angle = Math.random()*Math.PI*2;
      const dist = 2.5 + Math.random()*1.5;
      const wx = fbm(z*0.05,0,0)*8-4;
      const wy = fbm(0,z*0.05,1)*4-2;
      const x = wx + Math.cos(angle)*dist;
      const y = wy + Math.sin(angle)*dist - 0.5;
      addBoulder(group, x, y, -z, 0.15+Math.random()*0.7);
      // Small pebbles cluster
      for(let j=0;j<3;j++){
        addBoulder(group, x+Math.random()*0.6-0.3, y+Math.random()*0.4-0.2, -z+Math.random()*0.6-0.3, 0.04+Math.random()*0.1);
      }
    }
    // Stalactites
    for(let z=3; z<120; z+=2.8) {
      const wx = fbm(z*0.04,5,0)*6-3;
      const wy = fbm(0,z*0.04,6)*3-1.5;
      if(Math.random()<0.6) addStalactite(group, wx+Math.random()*3-1.5, wy+2.5, -z, 0.8+Math.random()*1.5, false);
      if(Math.random()<0.5) addStalactite(group, wx+Math.random()*3-1.5, wy-2.5, -z, 0.6+Math.random()*1.2, true);
    }
    // Floor rocks
    for(let z=1; z<120; z+=1.8) {
      const wx = fbm(z*0.06,2,0)*7-3.5;
      const wy = fbm(0,z*0.06,3)*3-1.5;
      for(let j=0; j<4; j++){
        addBoulder(group, wx+Math.random()*3-1.5, wy-2.2+Math.random()*0.3, -z+Math.random()-0.5, 0.05+Math.random()*0.25);
      }
    }
  }

  // ─── DRIPPING WATER / CRYSTAL FORMATIONS ──────────────────────────────────
  function addCrystals(group) {
    for(let i=0;i<40;i++){
      const z = -5-Math.random()*110;
      const wx = fbm(-z*0.05,7,0)*6-3;
      const wy = fbm(0,-z*0.05,7)*3-1.5;
      const x = wx+Math.random()*2-1;
      const y = wy + (Math.random()<0.5 ? 2.2 : -2.2) + Math.random()*0.4;
      const inverted = y > wy;
      const geo = new THREE.ConeGeometry(0.04+Math.random()*0.06, 0.3+Math.random()*0.5, 5);
      const colors = [0x4466aa, 0x336688, 0x557799, 0x223355];
      const mat = new THREE.MeshStandardMaterial({
        color: colors[Math.floor(Math.random()*colors.length)],
        roughness: 0.1, metalness: 0.3,
        transparent: true, opacity: 0.7,
        emissive: 0x111122, emissiveIntensity: 0.3
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, y, z);
      if(inverted) mesh.rotation.z = Math.PI;
      mesh.rotation.y = Math.random()*Math.PI*2;
      group.add(mesh);
    }
  }

  // ─── BUILD SCENE ──────────────────────────────────────────────────────────
  function buildScene() {
    caveGroup = new THREE.Group();
    scene.add(caveGroup);

    // Main tunnel
    const caveGeo = createCaveGeometry(30, 3.5, 120);
    const caveMat = createRockMaterial(0x2d2520);
    const cave = new THREE.Mesh(caveGeo, caveMat);
    cave.receiveShadow = true;
    caveGroup.add(cave);

    // Second overlapping tunnel for more organic shape
    const caveGeo2 = createCaveGeometry(20, 2.8, 120);
    const caveMat2 = createRockMaterial(0x251e1a);
    const cave2 = new THREE.Mesh(caveGeo2, caveMat2);
    cave2.rotation.z = Math.PI*0.15;
    cave2.receiveShadow = true;
    caveGroup.add(cave2);

    // Add details
    addWallRocks(caveGroup);
    addCrystals(caveGroup);

    // Ground plane (muddy floor)
    const floorGeo = new THREE.PlaneGeometry(8, 125, 20, 60);
    const floorPos = floorGeo.attributes.position;
    for(let i=0;i<floorPos.count;i++){
      const x=floorPos.getX(i), z=floorPos.getZ(i);
      floorPos.setY(i, fbm(x*0.5, 0, z*0.1)*0.25);
    }
    floorGeo.computeVertexNormals();
    const floorMat = new THREE.MeshStandardMaterial({
      color: 0x1a1510, roughness: 0.99, metalness: 0.0
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI/2;
    floor.position.set(0, -2.5, -60);
    floor.receiveShadow = true;
    caveGroup.add(floor);
  }

  // ─── TORCH FLICKER ─────────────────────────────────────────────────────────
  function flickerTorch(dt) {
    const t = clock.getElapsedTime();
    const flicker = 0.85 + 0.15*Math.sin(t*17.3) + 0.08*Math.sin(t*31.7) + 0.05*Math.sin(t*7.1);
    torchLight.intensity = 3.2 * flicker;
    torchLight.distance = 8 + 1.5*Math.sin(t*13.2);
    pointLight2.intensity = 1.0 * flicker;
    // Slight color shift
    const r = 1.0, g = 0.42 + 0.08*Math.sin(t*9.1), b = 0.05;
    torchLight.color.setRGB(r, g, b);
  }

  // ─── FLAME PARTICLES (CSS) ─────────────────────────────────────────────────
  const particles = [];
  function spawnFlameParticle() {
    const el = document.createElement('div');
    el.className = 'flame-particle';
    const size = 6 + Math.random()*14;
    const colors = ['rgba(255,255,150,0.9)','rgba(255,200,50,0.85)','rgba(255,120,20,0.8)','rgba(255,60,0,0.7)'];
    el.style.cssText = `
      width:${size}px; height:${size*1.4}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      bottom:${268 + Math.random()*10}px;
      right:${115 + Math.random()*20 - 10}px;
      animation-duration:${0.4+Math.random()*0.5}s;
      animation-delay:${Math.random()*0.2}s;
      transform:rotate(${Math.random()*30-15}deg);
    `;
    document.getElementById('flame-particles').appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
  setInterval(spawnFlameParticle, 60);

  // ─── INIT ──────────────────────────────────────────────────────────────────
  function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.FogExp2(0x080402, 0.12);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.05, 80);
    camera.position.set(0, 0, 2);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ReinhardToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.getElementById('game-root').insertBefore(renderer.domElement, document.getElementById('hud'));

    clock = new THREE.Clock();

    // Lights
    ambientLight = new THREE.AmbientLight(0x060402, 0.3);
    scene.add(ambientLight);

    torchLight = new THREE.PointLight(0xff6a0a, 3.2, 8, 2);
    torchLight.castShadow = true;
    torchLight.shadow.mapSize.set(512, 512);
    torchLight.shadow.camera.near = 0.05;
    torchLight.shadow.camera.far = 8;
    scene.add(torchLight);

    pointLight2 = new THREE.PointLight(0xff8820, 1.0, 4, 2);
    scene.add(pointLight2);

    buildScene();
    window.addEventListener('resize', onResize);
    document.addEventListener('keydown', e => { keys[e.code] = true; });
    document.addEventListener('keyup',   e => { keys[e.code] = false; });
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('pointerlockchange', () => {
      isLocked = document.pointerLockElement === document.getElementById('game-root');
    });
  }

  function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }

  function onMouseMove(e) {
    if(!isLocked) return;
    const sens = 0.0015;
    yaw   -= e.movementX * sens;
    pitch -= e.movementY * sens;
    pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
  }

  // ─── MOVEMENT ─────────────────────────────────────────────────────────────
  const euler = new THREE.Euler(0, 0, 0, 'YXZ');
  const velocity = new THREE.Vector3();
  const dir = new THREE.Vector3();

  function updateMovement(dt) {
    const speed = 3.5;
    dir.set(0,0,0);

    if(keys['KeyW']||keys['ArrowUp']||keys['KeyZ'])    dir.z -= 1;
    if(keys['KeyS']||keys['ArrowDown'])  dir.z += 1;
    if(keys['KeyA']||keys['ArrowLeft']||keys['KeyQ']) dir.x -= 1;
    if(keys['KeyD']||keys['ArrowRight']) dir.x += 1;

    if(dir.lengthSq() > 0) dir.normalize();
    dir.multiplyScalar(speed * dt);

    // Apply yaw rotation to direction
    dir.applyEuler(new THREE.Euler(0, yaw, 0, 'YXZ'));
    camera.position.add(dir);

    // Gentle bob when moving
    if(dir.lengthSq() > 0) {
      const t = clock.getElapsedTime();
      camera.position.y += Math.sin(t * 6) * 0.012;
    }

    // Clamp camera to stay inside tunnel approximately
    camera.position.y = Math.max(-1.8, Math.min(1.5, camera.position.y));
    camera.position.z = Math.min(2.5, camera.position.z);

    // Update depth display
    depthZ = Math.max(0, -camera.position.z);
    document.getElementById('depth-val').textContent = Math.floor(depthZ);

    // Rotate camera
    euler.set(pitch, yaw, 0);
    camera.rotation.copy(euler);

    // Torch light follows camera
    const fwd = new THREE.Vector3(0, -0.3, -1).applyEuler(euler);
    torchLight.position.copy(camera.position).addScaledVector(fwd, 1.2);
    torchLight.position.y += 0.1;
    pointLight2.position.copy(camera.position).addScaledVector(fwd, 0.8);
    pointLight2.position.y += 0.15;
  }

  // ─── LOOP ──────────────────────────────────────────────────────────────────
  function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    updateMovement(dt);
    flickerTorch(dt);
    renderer.render(scene, camera);
  }

  // ─── START ─────────────────────────────────────────────────────────────────
  window.startGame = function() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-root').requestPointerLock();
    animate();
  };

  document.addEventListener('DOMContentLoaded', () => {
    init();
  });

  // Click to lock pointer if lost
  document.addEventListener('click', () => {
    if(document.getElementById('start-screen').style.display === 'none' && !isLocked) {
      document.getElementById('game-root').requestPointerLock();
    }
  });
  </script>
</body>
</html>
