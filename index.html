<body>
  <!-- BGM audio element -->
  <audio id="bgm-audio" preload="auto" style="display:none"></audio>

  <!-- ═══════════════════════════════════════════════════════════════
       AUDIO SYSTEM — Web Audio API + AudioBuffer SFX, <audio> BGM
       ═══════════════════════════════════════════════════════════════ -->
  <script>
  (function() {
    'use strict';

    // ── Sound log (evaluator API) ─────────────────────────────────
    window.__SOUND_LOG__ = [];

    // ── AudioContext + buffers ────────────────────────────────────
    window._audioCtx = null;
    var _audioCtx = null;
    var _audioBuffers = {};
    var _bgmStarted = false;
    var _preloaded = false;
    var _bgmCurrentSrc = '';
    var _bgmLastIndex = -1;
    var _bgmShuffleBag = [];

    var BGM_TRACKS = [
      'https://rosebud.ai/assets/tron_inspired_beat.mp3?ceEY',
      'https://rosebud.ai/assets/tron_trap_soul_music.mp3?YKu0',
      'https://rosebud.ai/assets/ghost_coast_2030.mp3?SqQ4',
      'https://rosebud.ai/assets/synthwave_retro_80s_music.mp3?1F7J',
      'https://rosebud.ai/assets/synthwave_retro_80s_music_b.mp3?nvLn'
    ];

    var SFX_FILES = {
      'vehicle_place': 'https://rosebud.ai/assets/vehicle_place_tron.wav?Sfn2',
      'vehicle_slide': 'https://rosebud.ai/assets/vehicle_slide_tron.wav?HDXb',
      'vehicle_pickup': 'https://rosebud.ai/assets/vehicle_pickup_tron.wav?Jwbt',
      'win_exit': 'https://rosebud.ai/assets/win_exit_tron.wav?uNjC',
      'star_earn': 'https://rosebud.ai/assets/star_earn_tron.wav?sfQe',
      'button_click': 'https://rosebud.ai/assets/button_click_interface.wav?eM4f',
      'button_hover': 'https://rosebud.ai/assets/button_hover_interface.wav?n2El',
      'undo': 'https://rosebud.ai/assets/undo_interface.wav?zt0Y',
      'restart': 'https://rosebud.ai/assets/restart_interface.wav?LO6D',
      'confetti': 'https://rosebud.ai/assets/confetti_tron.wav?wfN8',
      'level_select_open': 'https://rosebud.ai/assets/level_select_open_tron.wav?lhXh'
    };

    function refillBgmShuffleBag() {
      _bgmShuffleBag = [];
      for (var i = 0; i < BGM_TRACKS.length; i++) _bgmShuffleBag.push(i);
      for (var j = _bgmShuffleBag.length - 1; j > 0; j--) {
        var swapIndex = Math.floor(Math.random() * (j + 1));
        var tmp = _bgmShuffleBag[j];
        _bgmShuffleBag[j] = _bgmShuffleBag[swapIndex];
        _bgmShuffleBag[swapIndex] = tmp;
      }
      if (_bgmShuffleBag.length > 1 && _bgmShuffleBag[0] === _bgmLastIndex) {
        var first = _bgmShuffleBag.shift();
        _bgmShuffleBag.push(first);
      }
    }

    function chooseNextBgmIndex() {
      if (!BGM_TRACKS.length) return -1;
      if (!_bgmShuffleBag.length) refillBgmShuffleBag();
      var nextIndex = _bgmShuffleBag.shift();
      _bgmLastIndex = nextIndex;
      return nextIndex;
    }

    function playNextBgmTrack() {
      var el = document.getElementById('bgm-audio');
      if (!el) return;
      var nextIndex = chooseNextBgmIndex();
      if (nextIndex < 0) return;
      var nextSrc = BGM_TRACKS[nextIndex];
      _bgmCurrentSrc = nextSrc;
      if (el.getAttribute('src') !== nextSrc) {
        el.src = nextSrc;
        el.load();
      }
      el.currentTime = 0;
      var playPromise = el.play();
      if (playPromise !== undefined) {
        playPromise.catch(function() {
          _bgmStarted = false;
        });
      }
    }

    function getAudioCtx() {
      if (!_audioCtx) {
        try {
          _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          window._audioCtx = _audioCtx;
        } catch (e) { return null; }
      }
      return _audioCtx;
    }

    function preloadSfx() {
      if (_preloaded) return;
      _preloaded = true;
      try {
        var ctx = getAudioCtx();
        Object.keys(SFX_FILES).forEach(function(name) {
          try {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', SFX_FILES[name], true);
            xhr.responseType = 'arraybuffer';
            xhr.onload = function() {
              if (xhr.status === 200 || xhr.status === 0) {
                try {
                  ctx.decodeAudioData(xhr.response, function(buf) {
                    _audioBuffers[name] = buf;
                  }, function() {});
                } catch (e) {}
              }
            };
            xhr.onerror = function() {};
            xhr.send();
          } catch (e) {}
        });
      } catch (e) {}
    }

    function startBgm() {
      if (_bgmStarted) return;
      _bgmStarted = true;
      var el = document.getElementById('bgm-audio');
      if (el) {
        el.volume = 0.35;
        el.loop = false;
        if (!el.__tronPlaylistBound) {
          el.addEventListener('ended', function() {
            playNextBgmTrack();
          });
          el.__tronPlaylistBound = true;
        }
        playNextBgmTrack();
      }
    }

    function playSfxBuffer(name) {
      if (!_audioBuffers[name]) return;
      try {
        var ctx = getAudioCtx();
        if (!ctx) return;
        if (ctx.state === 'suspended') {
          ctx.resume().then(function() {
            var src = ctx.createBufferSource();
            src.buffer = _audioBuffers[name];
            src.connect(ctx.destination);
            src.start(0);
          }).catch(function() {});
        } else {
          var src = ctx.createBufferSource();
          src.buffer = _audioBuffers[name];
          src.connect(ctx.destination);
          src.start(0);
        }
      } catch (e) {}
    }

    // ── playSound public API ──────────────────────────────────────
    window.playSound = function(name) {
      window.__SOUND_LOG__.push({
        name: name,
        frame: window.__GAME_STATE__ ? (window.__GAME_STATE__.getState().frameCount || 0) : 0
      });
      try {
        var ctx = getAudioCtx();
        if (ctx && ctx.state === 'suspended') {
          ctx.resume().then(function() {
            preloadSfx();
            startBgm();
            playSfxBuffer(name);
          }).catch(function() {});
        } else {
          preloadSfx();
          startBgm();
          playSfxBuffer(name);
        }
      } catch (e) {}
    };

    // ── Unlock AudioContext on first user gesture ─────────────────
    var _audioUnlocked = false;
    function unlockAudio() {
      if (_audioUnlocked) return;
      _audioUnlocked = true;
      try {
        var ctx = getAudioCtx();
        preloadSfx();
        
        // Start BGM immediately
        var el = document.getElementById('bgm-audio');
        if (el) {
          el.volume = 0.35;
          el.loop = false;
          if (!el.__tronPlaylistBound) {
            el.addEventListener('ended', function() {
              playNextBgmTrack();
            });
            el.__tronPlaylistBound = true;
          }
          if (!_bgmStarted || !_bgmCurrentSrc) {
            _bgmStarted = true;
            playNextBgmTrack();
          } else {
            el.play().then(function() {
              _bgmStarted = true;
            }).catch(function() {
              _bgmStarted = false;
            });
          }
        }
        
        // Resume AudioContext
        if (ctx && ctx.state === 'suspended') {
          ctx.resume().catch(function() {});
        }
      } catch (e) {}
    }
    
    // Expose unlockAudio globally so Input can call it
    window.__unlockAudio = unlockAudio;

  })();
  </script>

  <script>
  (function() {
    var state = { entities: {}, frameCount: 0, running: false, errors: [] };
    window.__GAME_STATE__ = {
      getState: function() { return JSON.parse(JSON.stringify(state)); },
      loadState: function(newState) {
        if (newState.entities) state.entities = JSON.parse(JSON.stringify(newState.entities));
        if (typeof newState.frameCount === 'number') state.frameCount = newState.frameCount;
        if (typeof newState.running === 'boolean') state.running = newState.running;
        if (newState.errors) state.errors = JSON.parse(JSON.stringify(newState.errors));
        if (typeof window.__GAME_STATE__.onLoadState === 'function') {
          window.__GAME_STATE__.onLoadState(JSON.parse(JSON.stringify(state)));
        }
      },
      registerEntity: function(id, initial) { state.entities[id] = Object.assign({}, initial); },
      updateEntity: function(id, next) { state.entities[id] = Object.assign({}, next); },
      start: function() { state.running = true; },
      stop: function() { state.running = false; },
      tick: function() { state.frameCount++; },
      recordError: function(msg) { state.errors.push(msg); },
      serialize: function() { return JSON.stringify(state); }
    };
  })();
  </script>
  <script>
  (function() {
    'use strict';

    // ═══════════════════════════════════════════════════════════════
    // EMBEDDED LEVELS DATA
    // ═══════════════════════════════════════════════════════════════
    var LEVELS_DATA = [{"id":1,"tier":1,"par":4,"vehicles":[{"id":0,"row":2,"col":0,"orientation":"horizontal","length":2,"type":"primary"},{"id":1,"row":2,"col":4,"orientation":"vertical","length":2,"type":"car"},{"id":2,"row":5,"col":2,"orientation":"horizontal","length":2,"type":"car"},{"id":3,"row":1,"col":0,"orientation":"horizontal","length":3,"type":"truck"},{"id":4,"row":4,"col":4,"orientation":"horizontal","length":2,"type":"car"},{"id":5,"row":2,"col":3,"orientation":"vertical","length":3,"type":"truck"},{"id":6,"row":0,"col":0,"orientation":"horizontal","length":2,"type":"car"}],"solution":[{"vehicleId":1,"direction":"up","distance":2},{"vehicleId":2,"direction":"left","distance":1},{"vehicleId":5,"direction":"down","distance":1},{"vehicleId":0,"direction":"right","distance":4}]},{"id":2,"tier":1,"par":4,"vehicles":[{"id":0,"row":2,"col":1,"orientation":"horizontal","length":2,"type":"primary"},{"id":1,"row":3,"col":2,"orientation":"horizontal","length":3,"type":"truck"},{"id":2,"row":0,"col":0,"orientation":"vertical","length":2,"type":"car"},{"id":3,"row":1,"col":3,"orientation":"vertical","length":2,"type":"car"},{"id":4,"row":0,"col":3,"orientation":"horizontal","length":2,"type":"car"},{"id":5,"row":2,"col":5,"orientation":"vertical","length":2,"type":"car"}],"solution":[{"vehicleId":1,"direction":"left","distance":2},{"vehicleId":3,"direction":"down","distance":2},{"vehicleId":5,"direction":"up","distance":2},{"vehicleId":0,"direction":"right","distance":3}]},{"id":3,"tier":1,"par":4,"vehicles":[{"id":0,"row":2,"col":0,"orientation":"horizontal","length":2,"type":"primary"},{"id":1,"row":0,"col":4,"orientation":"horizontal","length":2,"type":"car"},{"id":2,"row":1,"col":3,"orientation":"vertical","length":3,"type":"truck"},{"id":3,"row":4,"col":0,"orientation":"horizontal","length":3,"type":"truck"},{"id":4,"row":2,"col":2,"orientation":"vertical","length":2,"type":"car"},{"id":5,"row":1,"col":0,"orientation":"horizontal","length":2,"type":"car"}...

    // ═══════════════════════════════════════════════════════════════
    // BOARD MODULE
    // ═══════════════════════════════════════════════════════════════
    var Board = (function() {
      var GRID_COLS = 6, GRID_ROWS = 6;
      var CAR_COLORS = ['#7EAAB8', '#D4A65A', '#7BA87B', '#9B8EB5', '#C88B96', '#7AACAC'];
      var TRUCK_COLORS = ['#C8825A', '#8088B0', '#6B9E94'];
      var PRIMARY_COLOR = '#C45C4A';

      var vehicles = [];
      var initialVehicles = [];
      var occupancy = [];
      var moveCount = 0;
      var undoStack = [];
      var won = false;
      var draggingVehicleId = -1;
      var levelId = 1;
      var levelPar = 0;
      var levelTier = 1;

      var FALLBACK_LEVEL = {
        id: 1, tier: 1, par: 8,
        vehicles: [
          { id: 0, row: 2, col: 0, orientation: 'horizontal', length: 2, type: 'primary' },
          { id: 1, row: 0, col: 2, orientation: 'vertical', length: 3, type: 'truck' },
          { id: 2, row: 0, col: 0, orientation: 'vertical', length: 2, type: 'car' },
          { id: 3, row: 3, col: 2, orientation: 'horizontal', length: 2, type: 'car' },
          { id: 4, row: 4, col: 4, orientation: 'vertical', length: 2, type: 'car' },
          { id: 5, row: 1, col: 4, orientation: 'horizontal', length: 2, type: 'car' }
        ],
        solution: []
      };

      function buildOccupancy() {
        occupancy = [];
        for (var r = 0; r < GRID_ROWS; r++) {
          occupancy[r] = [];
          for (var c = 0; c < GRID_COLS; c++) {
            occupancy[r][c] = -1;
          }
        }
        for (var i = 0; i < vehicles.length; i++) {
          var v = vehicles[i];
          for (var j = 0; j < v.length; j++) {
            var rr = v.orientation === 'vertical' ? v.row + j : v.row;
            var cc = v.orientation === 'horizontal' ? v.col + j : v.col;
            if (rr >= 0 && rr < GRID_ROWS && cc >= 0 && cc < GRID_COLS) {
              occupancy[rr][cc] = v.id;
            }
          }
        }
      }

      function assignColors(vehicleList) {
        var carIdx = 0, truckIdx = 0;
        for (var i = 0; i < vehicleList.length; i++) {
          var v = vehicleList[i];
          if (v.type === 'primary') { v.color = PRIMARY_COLOR; }
          else if (v.type === 'truck') { v.color = TRUCK_COLORS[truckIdx % TRUCK_COLORS.length]; truckIdx++; }
          else { v.color = CAR_COLORS[carIdx % CAR_COLORS.length]; carIdx++; }
        }
      }

      return {
        getFallbackLevel: function() { return FALLBACK_LEVEL; },
        loadLevel: function(levelData) {
          if (!levelData || !levelData.vehicles) levelData = FALLBACK_LEVEL;
          levelId = levelData.id || 1;
          levelPar = levelData.par || 0;
          levelTier = levelData.tier || 1;
          vehicles = levelData.vehicles.map(function(v) {
            return { id: v.id, row: v.row, col: v.col, orientation: v.orientation, length: v.length, type: v.type, color: v.color || '' };
          });
          assignColors(vehicles);
          initialVehicles = vehicles.map(function(v) { return Object.assign({}, v); });
          moveCount = 0; undoStack = []; won = false; draggingVehicleId = -1;
          buildOccupancy();
        },
        getVehicles: function() { return vehicles; },
        getVehicleById: function(id) { return vehicles.find(function(v) { return v.id === id; }) || null; },
        getMoveCount: function() { return moveCount; },
        getUndoStack: function() { return undoStack; },
        isWon: function() { return won; },
        getLevelId: function() { return levelId; },
        getLevelPar: function() { return levelPar; },
        getLevelTier: function() { return levelTier; },
        getCurrentLevelData: function() { return { id: levelId, tier: levelTier, par: levelPar }; },
        getMoveBounds: function(vehicleId) {
          var v = this.getVehicleById(vehicleId);
          if (!v) return { min: 0, max: 0 };
          var isHoriz = v.orientation === 'horizontal';
          var isPrimary = v.id === 0;
          if (isHoriz) {
            var minCol = v.col;
            for (var c = v.col - 1; c >= 0; c--) {
              if (occupancy[v.row][c] !== -1 && occupancy[v.row][c] !== v.id) break;
              minCol = c;
            }
            var maxCol = v.col;
            var maxBound = isPrimary ? 4 : (GRID_COLS - v.length);
            for (var c2 = v.col + 1; c2 <= maxBound; c2++) {
              var rightCell = c2 + v.length - 1;
              if (rightCell >= GRID_COLS && !isPrimary) break;
              if (rightCell < GRID_COLS && occupancy[v.row][rightCell] !== -1 && occupancy[v.row][rightCell] !== v.id) break;
              maxCol = c2;
            }
            return { min: minCol, max: maxCol };
          } else {
            var minRow = v.row;
            for (var r = v.row - 1; r >= 0; r--) {
              if (occupancy[r][v.col] !== -1 && occupancy[r][v.col] !== v.id) break;
              minRow = r;
            }
            var maxRow = v.row;
            var maxBound2 = GRID_ROWS - v.length;
            for (var r2 = v.row + 1; r2 <= maxBound2; r2++) {
              var bottomCell = r2 + v.length - 1;
              if (bottomCell >= GRID_ROWS) break;
              if (occupancy[bottomCell][v.col] !== -1 && occupancy[bottomCell][v.col] !== v.id) break;
              maxRow = r2;
            }
            return { min: minRow, max: maxRow };
          }
        },
        applyMove: function(vehicleId, newRow, newCol) {
          if (won) return false;
          var v = this.getVehicleById(vehicleId);
          if (!v) return false;
          if (v.row === newRow && v.col === newCol) return false;
          undoStack.push({ vehicleId: v.id, fromRow: v.row, fromCol: v.col, toRow: newRow, toCol: newCol });
          v.row = newRow; v.col = newCol; moveCount++;
          buildOccupancy();
          if (v.id === 0 && v.col + v.length > 5) { won = true; }
          return true;
        },
        undo: function() {
          if (undoStack.length === 0) return false;
          var entry = undoStack.pop();
          var v = this.getVehicleById(entry.vehicleId);
          if (v) { v.row = entry.fromRow; v.col = entry.fromCol; moveCount--; if (moveCount < 0) moveCount = 0; buildOccupancy(); won = false; }
          return true;
        },
        restart: function() {
          vehicles = initialVehicles.map(function(v) { return Object.assign({}, v); });
          moveCount = 0; undoStack = []; won = false; draggingVehicleId = -1;
          buildOccupancy();
        },
        getBoardState: function() {
          return {
            gridCols: GRID_COLS, gridRows: GRID_ROWS, levelId: levelId,
            vehicles: vehicles.map(function(v) { return { id: v.id, row: v.row, col: v.col, orientation: v.orientation, length: v.length, type: v.type, color: v.color }; }),
            moveCount: moveCount, undoStackLength: undoStack.length, won: won, draggingVehicleId: draggingVehicleId,
            par: levelPar, tier: levelTier
          };
        },
        setDraggingVehicleId: function(id) { draggingVehicleId = id; },
        getDraggingVehicleId: function() { return draggingVehicleId; },
        loadFromState: function(stateObj) {
          if (stateObj.vehicles && Array.isArray(stateObj.vehicles)) {
            vehicles = stateObj.vehicles.map(function(v) {
              return { id: v.id, row: v.row, col: v.col, orientation: v.orientation, length: v.length, type: v.type, color: v.color || '' };
            });
            var needsColors = vehicles.some(function(v) { return !v.color; });
            if (needsColors) {
              var carIdx = 0, truckIdx = 0;
              for (var i = 0; i < vehicles.length; i++) {
                var vv = vehicles[i];
                if (vv.color) { if (vv.type === 'car') carIdx++; else if (vv.type === 'truck') truckIdx++; continue; }
                if (vv.type === 'primary') { vv.color = PRIMARY_COLOR; }
                else if (vv.type === 'truck') { vv.color = TRUCK_COLORS[truckIdx % TRUCK_COLORS.length]; truckIdx++; }
                else { vv.color = CAR_COLORS[carIdx % CAR_COLORS.length]; carIdx++; }
              }
            }
            initialVehicles = vehicles.map(function(v) { return Object.assign({}, v); });
            buildOccupancy();
          }
          if (typeof stateObj.moveCount === 'number') moveCount = stateObj.moveCount;
          if (typeof stateObj.won === 'boolean') won = stateObj.won;
          if (typeof stateObj.draggingVehicleId === 'number') draggingVehicleId = stateObj.draggingVehicleId;
          if (typeof stateObj.levelId === 'number') levelId = stateObj.levelId;
          if (typeof stateObj.par === 'number') levelPar = stateObj.par;
          if (typeof stateObj.tier === 'number') levelTier = stateObj.tier;
          undoStack = [];
        }
      };
    })();

    // ═══════════════════════════════════════════════════════════════
    // HUD MODULE
    // ═══════════════════════════════════════════════════════════════
    var Hud = (function() {
      var BOTTOM_BAR_Y = 660;
      var buttons = [];
      var levelLabel = 'Level 1';
      var moveCountDisplay = 0;

      return {
        initHud: function() {
          buttons = [
            { id: 'back', label: '\u2039', x: 10, y: 10, width: 40, height: 40, enabled: true, hovered: false, pressed: false },
            { id: 'undo', label: 'Undo', x: 70, y: BOTTOM_BAR_Y + 10, width: 130, height: 40, enabled: false, hovered: false, pressed: false },
            { id: 'restart', label: 'Restart', x: 340, y: BOTTOM_BAR_Y + 10, width: 130, height: 40, enabled: false, hovered: false, pressed: false }
          ];
        },
        getButtons: function() { return buttons; },
        hitTestButtons: function(cx, cy) {
          for (var i = 0; i < buttons.length; i++) {
            var b = buttons[i];
            if (cx >= b.x && cx <= b.x + b.width && cy >= b.y && cy <= b.y + b.height) return b.id;
          }
          return null;
        },
        setButtonEnabled: function(id, en) { var b = buttons.find(function(x){return x.id===id;}); if(b) b.enabled = en; },
        setButtonHovered: function(id, h) { var b = buttons.find(function(x){return x.id===id;}); if(b) b.hovered = h; },
        setLevelLabel: function(t) { levelLabel = t; },
        setMoveCount: function(c) { moveCountDisplay = c; },
        getLevelLabel: function() { return levelLabel; },
        getMoveCountDisplay: function() { return moveCountDisplay; },
        getHudState: function() {
          var ub = buttons.find(function(x){return x.id==='undo';});
          var rb = buttons.find(function(x){return x.id==='restart';});
          return { undoEnabled: ub ? ub.enabled : false, restartEnabled: rb ? rb.enabled : false, levelLabel: levelLabel, moveCount: moveCountDisplay };
        }
      };
    })();

    // ═══════════════════════════════════════════════════════════════
    // RENDERER MODULE
    // ═══════════════════════════════════════════════════════════════
    var Renderer = (function() {
      var CANVAS_WIDTH = 540, CANVAS_HEIGHT = 720;
      var BOARD_SIZE = 480, CELL_SIZE = 80;
      var BOARD_X = 30, BOARD_Y = 120;
      var VEHICLE_PADDING = 4;
      var TOP_BAR_HEIGHT = 60;
      var BOTTOM_BAR_Y = 660, BOTTOM_BAR_HEIGHT = 60;
      var canvas = null, ctx = null, startTime = Date.now();

      function getThemeName() {
        return (window.TrafficJamTheme && window.TrafficJamTheme.themeName) || 'default';
      }

      function isTronTheme() {
        return getThemeName() === 'tron-grid-test';
      }

      var TRON_STYLE = {
        text: '#d7fbff',
        textDim: '#9ac7d8',
        cyan: '#74f4ff',
        cyanSoft: '#7dcfff',
        amber: '#ffd86b',
        amberSoft: '#ffc84d',
        white: '#f7fdff',
        muted: '#253248',
        mutedText: '#51607c',
        panel: 'rgba(4,11,23,0.94)',
        panelAlt: 'rgba(9,18,32,0.92)',
        panelDisabled: 'rgba(17,24,36,0.84)',

        boardGap: 'rgba(5,14,26,0.94)',
        cyanStroke: 'rgba(116,244,255,0.96)',
        cyanStrokeSoft: 'rgba(116,244,255,0.42)',
        cyanShadow: 'rgba(116,244,255,0.4)',
        amberStroke: 'rgba(255,216,107,0.96)',
        amberShadow: 'rgba(255,216,107,0.32)',

      function drawThemeSprite(category, key, x, y, w, h, options) {

      function getVehicleThemeKey(v) {

      function getNeonVehiclePalette(v) {

            accent2: '#ffb3b3',

            shell1: '#3a0d14',
            shell2: '#120409',
            cockpit: 'rgba(255,235,235,0.34)',

          };
        }
        var paletteMap = {
          '#7EAAB8': { accent: '#00f7ff', accent2: '#7cf7ff', shell0: '#041117', shell1: '#0a2430', shell2: '#030a0f', cockpit: 'rgba(220,250,255,0.24)' },
          '#D4A65A': { accent: '#ffd24a', accent2: '#ff7a00', shell0: '#181005', shell1: '#34220a', shell2: '#0d0803', cockpit: 'rgba(255,236,190,0.22)' },
          '#7BA87B': { accent: '#52ff9a', accent2: '#00d084', shell0: '#06140c', shell1: '#0d2a17', shell2: '#040a06', cockpit: 'rgba(214,255,232,0.22)' },
          '#9B8EB5': { accent: '#ffd86b', accent2: '#8cf6ff', shell0: '#15110a', shell1: '#31240f', shell2: '#0b0804', cockpit: 'rgba(255,243,214,0.24)' },
          '#C88B96': { accent: '#ffc84d', accent2: '#76f8ff', shell0: '#171007', shell1: '#33200d', shell2: '#0d0804', cockpit: 'rgba(255,241,214,0.24)' },
          '#7AACAC': { accent: '#44ffd1', accent2: '#00c2ff', shell0: '#061414', shell1: '#0d2929', shell2: '#040a0a', cockpit: 'rgba(218,255,246,0.22)' },
          '#C8825A': { accent: '#ff8a3d', accent2: '#ffd24a', shell0: '#170b05', shell1: '#30170b', shell2: '#0d0603', cockpit: 'rgba(255,232,212,0.22)' },
          '#8088B0': { accent: '#7aa2ff', accent2: '#00f7ff', shell0: '#090c17', shell1: '#151d32', shell2: '#05070d', cockpit: 'rgba(225,232,255,0.22)' },
          '#6B9E94': { accent: '#2df0c8', accent2: '#9affea', shell0: '#051411', shell1: '#0d2822', shell2: '#030a08', cockpit: 'rgba(220,255,245,0.22)' }
        };
        return paletteMap[v.color] || {
          accent: '#00f7ff',
          accent2: '#ffd86b',
          shell0: '#061019',
          shell1: '#0d2030',

      function fillRoundRect(x, y, w, h, r, fillStyle) {

      function strokeRoundRect(x, y, w, h, r, strokeStyle, lineWidth) {

      }

      function darkenColor(hex, amount) {
        var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        r = Math.max(0, Math.floor(r*(1-amount))); g = Math.max(0, Math.floor(g*(1-amount))); b = Math.max(0, Math.floor(b*(1-amount)));
        return '#' + r.toString(16).padStart(2,'0') + g.toString(16).padStart(2,'0') + b.toString(16).padStart(2,'0');
      }

      function drawRoundedRect(x,y,w,h,r) {
        ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
        ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);

      }

      function drawBackdrop(variant) {
        if (!isTronTheme()) {
          ctx.fillStyle = '#FBF7F0';
          ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
          return;
        }

        var now = Date.now() * 0.001;
        var bg = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
        bg.addColorStop(0, TRON_STYLE.backdropTop);
        bg.addColorStop(0.45, TRON_STYLE.backdropMid);
        bg.addColorStop(1, TRON_STYLE.backdropBottom);
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        var flare = ctx.createRadialGradient(CANVAS_WIDTH * 0.5, 120, 20, CANVAS_WIDTH * 0.5, 120, 240);
        flare.addColorStop(0, 'rgba(116,244,255,0.28)');
        flare.addColorStop(0.45, 'rgba(116,244,255,0.1)');
        flare.addColorStop(1, 'rgba(116,244,255,0)');
        ctx.fillStyle = flare;
        ctx.fillRect(0, 0, CANVAS_WIDTH, 340);

        var amber = ctx.createRadialGradient(CANVAS_WIDTH * 0.78, CANVAS_HEIGHT * 0.82, 10, CANVAS_WIDTH * 0.78, CANVAS_HEIGHT * 0.82, 180);
        amber.addColorStop(0, 'rgba(255,216,107,0.16)');
        amber.addColorStop(1, 'rgba(255,216,107,0)');
        ctx.fillStyle = amber;
        ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        ctx.save();
        var horizonY = variant === 'title' ? 418 : 446;
        ctx.strokeStyle = 'rgba(116,244,255,0.16)';
        ctx.lineWidth = 1;
        for (var gy = horizonY; gy < CANVAS_HEIGHT + 140; gy += 26) {
          var t = (gy - horizonY) / (CANVAS_HEIGHT - horizonY + 140);
          var inset = 40 + t * 210;
          ctx.beginPath();
          ctx.moveTo(inset, gy + 0.5);
          ctx.lineTo(CANVAS_WIDTH - inset, gy + 0.5);
          ctx.stroke();
        }
        for (var gx = -CANVAS_WIDTH * 0.15; gx <= CANVAS_WIDTH * 1.15; gx += 40) {
          ctx.beginPath();
          ctx.moveTo(gx, CANVAS_HEIGHT + 40);
          ctx.lineTo(CANVAS_WIDTH * 0.5 + (gx - CANVAS_WIDTH * 0.5) * 0.14, horizonY);
          ctx.stroke();
        }
        ctx.restore();

        ctx.save();
        for (var i = 0; i < 24; i++) {
          var px = (i * 73 + now * (8 + i % 5) * 14) % (CANVAS_WIDTH + 120) - 60;
          var py = 80 + ((i * 91) % 520);
          var alpha = 0.05 + (i % 4) * 0.02;
          ctx.fillStyle = i % 5 === 0 ? 'rgba(255,216,107,' + alpha + ')' : 'rgba(124,247,255,' + alpha + ')';
          ctx.fillRect(px, py, 2, 2);
        }
        ctx.restore();
      }

      function drawGlassPanel(x, y, w, h, radius, options) {
        var opts = options || {};
        var fill = opts.fill || 'rgba(8,16,29,0.9)';
        var stroke = opts.stroke || 'rgba(0,247,255,0.32)';
        var inner = opts.inner || 'rgba(255,255,255,0.05)';
        var shadow = opts.shadow || 'rgba(0,247,255,0.12)';

        ctx.save();
        ctx.shadowColor = shadow;
        ctx.shadowBlur = opts.shadowBlur || 20;
        drawRoundedRect(x, y, w, h, radius);
        ctx.fillStyle = fill;
        ctx.fill();
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
        drawRoundedRect(x, y, w, h, radius);
        ctx.strokeStyle = stroke;
        ctx.lineWidth = opts.lineWidth || 2;
        ctx.stroke();
        drawRoundedRect(x, y, w, h, radius);
        ctx.strokeStyle = stroke;
        ctx.globalAlpha = 0.35;
        ctx.lineWidth = (opts.lineWidth || 2) + 3;
        ctx.stroke();
        ctx.globalAlpha = 1;
        drawRoundedRect(x + 4, y + 4, w - 8, h - 8, Math.max(4, radius - 4));
        ctx.strokeStyle = inner;
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.restore();
      }

      function drawVehicle(v, x, y, shadow, vScale) {
        var isH = v.orientation === 'horizontal';
        var w = isH ? CELL_SIZE*v.length - VEHICLE_PADDING*2 : CELL_SIZE - VEHICLE_PADDING*2;
        var h = isH ? CELL_SIZE - VEHICLE_PADDING*2 : CELL_SIZE*v.length - VEHICLE_PADDING*2;
        var vx = x + VEHICLE_PADDING, vy = y + VEHICLE_PADDING;
        var neonMode = isTronTheme();
        ctx.save();
        // Apply optional scale (for board entrance or drag lift)
        var sc = vScale || 1;
        if (sc !== 1) {
          var centerX = vx + w/2, centerY = vy + h/2;
          ctx.translate(centerX, centerY);
          ctx.scale(sc, sc);
          ctx.translate(-centerX, -centerY);
        }
        if (shadow) {
          ctx.shadowColor = 'rgba(74,55,40,0.2)'; ctx.shadowOffsetY = 4; ctx.shadowBlur = 10;
          // Slight lift scale for dragged vehicle
          var liftCX = vx + w/2, liftCY = vy + h/2;
          ctx.translate(liftCX, liftCY);
          ctx.scale(1.03, 1.03);
          ctx.translate(-liftCX, -liftCY);
        }
        if (neonMode) {
          var palette = getNeonVehiclePalette(v);
          var accent = palette.accent;
          var accent2 = palette.accent2;
          var shellGrad = isH ? ctx.createLinearGradient(vx, vy, vx + w, vy + h) : ctx.createLinearGradient(vx, vy, vx + w, vy + h);
          shellGrad.addColorStop(0, palette.shell0);
          shellGrad.addColorStop(0.55, palette.shell1);
          shellGrad.addColorStop(1, palette.shell2);
          if (shadow) {
            ctx.shadowColor = accent;
            ctx.shadowBlur = 18;
            ctx.shadowOffsetY = 6;
          }
          fillRoundRect(vx, vy, w, h, 16, shellGrad);
          ctx.shadowColor = 'transparent';
          ctx.shadowBlur = 0;
          ctx.shadowOffsetY = 0;

          var edgeGrad = isH ? ctx.createLinearGradient(vx, vy, vx + w, vy) : ctx.createLinearGradient(vx, vy, vx, vy + h);
          edgeGrad.addColorStop(0, accent);
          edgeGrad.addColorStop(0.5, '#ffffff');
          edgeGrad.addColorStop(1, accent2);
          strokeRoundRect(vx, vy, w, h, 16, edgeGrad, 3);
          strokeRoundRect(vx + 3, vy + 3, w - 6, h - 6, 13, 'rgba(255,255,255,0.06)', 1.5);

          var laneInset = isH
            ? { x: vx + 14, y: vy + h * 0.5 - 5, w: w - 28, h: 10 }
            : { x: vx + w * 0.5 - 5, y: vy + 14, w: 10, h: h - 28 };
          var laneGrad = isH
            ? ctx.createLinearGradient(laneInset.x, laneInset.y, laneInset.x + laneInset.w, laneInset.y)
            : ctx.createLinearGradient(laneInset.x, laneInset.y, laneInset.x, laneInset.y + laneInset.h);
          laneGrad.addColorStop(0, accent);
          laneGrad.addColorStop(1, accent2);
          fillRoundRect(laneInset.x, laneInset.y, laneInset.w, laneInset.h, 8, laneGrad);

          var coreInset = 8;
          var coreGrad = isH
            ? ctx.createLinearGradient(vx, vy + 6, vx, vy + h * 0.7)
            : ctx.createLinearGradient(vx + 6, vy, vx + w * 0.7, vy);
          coreGrad.addColorStop(0, 'rgba(255,255,255,0.18)');
          coreGrad.addColorStop(0.4, 'rgba(255,255,255,0.06)');
          coreGrad.addColorStop(1, 'rgba(255,255,255,0)');
          fillRoundRect(vx + coreInset, vy + coreInset, w - coreInset * 2, h - coreInset * 2, 12, coreGrad);

          if (v.type === 'primary') {
            if (isH) {
              fillRoundRect(vx + w - 38, vy + h / 2 - 9, 22, 18, 5, palette.cockpit);
              fillRoundRect(vx + 10, vy + h / 2 - 8, 14, 16, 7, 'rgba(255,255,255,0.18)');
            } else {
              fillRoundRect(vx + w / 2 - 9, vy + 16, 18, 22, 5, palette.cockpit);
              fillRoundRect(vx + w / 2 - 8, vy + h - 24, 16, 14, 7, 'rgba(255,255,255,0.18)');
            }
            strokeRoundRect(vx + 8, vy + 8, w - 16, h - 16, 12, 'rgba(255,255,255,0.22)', 1.5);
          } else if (v.type === 'truck') {
            if (isH) {
              fillRoundRect(vx + w - 34, vy + h / 2 - 8, 18, 16, 5, palette.cockpit);
            } else {
              fillRoundRect(vx + w / 2 - 8, vy + 16, 16, 18, 5, palette.cockpit);
            }
            for (var seg = 1; seg < v.length; seg++) {
              if (isH) {
                strokeRoundRect(vx + seg * CELL_SIZE - VEHICLE_PADDING * 2 - 6, vy + 8, 10, h - 16, 4, 'rgba(255,255,255,0.08)', 1);
              } else {
                strokeRoundRect(vx + 8, vy + seg * CELL_SIZE - VEHICLE_PADDING * 2 - 6, w - 16, 10, 4, 'rgba(255,255,255,0.08)', 1);
              }
            }
          } else {
            if (isH) {
              fillRoundRect(vx + w - 32, vy + h / 2 - 7, 16, 14, 5, palette.cockpit);
            } else {
              fillRoundRect(vx + w / 2 - 7, vy + 14, 14, 16, 5, palette.cockpit);
            }
          }

          ctx.beginPath();
          ctx.arc(vx + 16, vy + 16, 2.5, 0, Math.PI * 2);
          ctx.arc(vx + w - 16, vy + h - 16, 2.5, 0, Math.PI * 2);
          ctx.fillStyle = accent;
          ctx.fill();
          ctx.restore();
          return;
        }
        drawRoundedRect(vx,vy,w,h,12); ctx.fillStyle = v.color; ctx.fill();
        ctx.shadowColor = 'transparent'; ctx.shadowOffsetY = 0; ctx.shadowBlur = 0;
        // Glossy highlight
        var glossGrad = ctx.createLinearGradient(vx, vy, vx, vy + h * 0.5);
        glossGrad.addColorStop(0, 'rgba(255,255,255,0.35)');
        glossGrad.addColorStop(0.5, 'rgba(255,255,255,0.1)');
        glossGrad.addColorStop(1, 'rgba(255,255,255,0)');
        drawRoundedRect(vx,vy,w,h,12);
        ctx.fillStyle = glossGrad;
        ctx.fill();
        // Stroke
        drawRoundedRect(vx,vy,w,h,12);
        ctx.strokeStyle = darkenColor(v.color, 0.2); ctx.lineWidth = 2; ctx.stroke();
        if (v.type === 'primary') {
          var wsW = 20, wsH = 12;
          var wsX = vx + w - wsW - 6, wsY = vy + (h - wsH)/2;
          ctx.fillStyle = '#E8A99A'; drawRoundedRect(wsX,wsY,wsW,wsH,3); ctx.fill();
        }
        ctx.restore();
      }

      function drawPillButton(btn, textColor, bgColor, fontSize, options) {
        ctx.save();
        var opts = options || {};
        var scale = 1;
        // Use Anim for smooth button scale if available
        if (typeof Anim !== 'undefined' && Anim.getButtonScale) {
          scale = Anim.getButtonScale(btn.id) || 1;
        } else {
          if (btn.pressed) scale = 0.98;
          else if (btn.hovered && btn.enabled) scale = 1.05;
        }
        var cx = btn.x + btn.width/2, cy = btn.y + btn.height/2;
        ctx.translate(cx,cy); ctx.scale(scale,scale); ctx.translate(-cx,-cy);
        if (opts.tron) {
          drawGlassPanel(btn.x, btn.y, btn.width, btn.height, btn.height/2, {
            fill: btn.enabled ? (opts.fill || TRON_STYLE.panelAlt) : TRON_STYLE.panelDisabled,
            stroke: btn.enabled ? (opts.stroke || TRON_STYLE.cyanStroke) : 'rgba(87,104,128,0.4)',
            inner: 'rgba(255,255,255,0.08)',
            shadow: btn.enabled ? (opts.shadow || TRON_STYLE.cyanShadow) : 'rgba(0,0,0,0.12)',
            shadowBlur: btn.enabled ? 28 : 12,
            lineWidth: opts.lineWidth || 2
          });
        } else {
          drawRoundedRect(btn.x,btn.y,btn.width,btn.height,btn.height/2); ctx.fillStyle = bgColor; ctx.fill();
        }
        ctx.fillStyle = btn.enabled ? textColor : (opts.disabledText || '#7a8aa3');
        ctx.font = '700 ' + fontSize + 'px Rajdhani, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(btn.label, cx, cy);
        ctx.restore();
      }

      function drawStar(cx, cy, outerR, innerR) {
        ctx.beginPath();
        for (var i = 0; i < 10; i++) {
          var r = i % 2 === 0 ? outerR : innerR;
          var angle = (Math.PI / 2) * -1 + (Math.PI / 5) * i;
          var sx = cx + r * Math.cos(angle);
          var sy = cy + r * Math.sin(angle);
          if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        }
        ctx.closePath();
      }

      function renderStarCounter(starCx, centerY, label, options) {
        var opts = options || {};
        var starOuter = opts.starOuter || 10;
        var starInner = opts.starInner || (starOuter * 0.42);
        var gap = opts.gap || 14;
        var font = opts.font || (isTronTheme() ? '700 20px Rajdhani, sans-serif' : '18px Nunito, sans-serif');
        ctx.save();
        ctx.font = font;
        var textWidth = ctx.measureText(label).width;
        ctx.restore();
        if (opts.centerGroupX !== undefined) {
          starCx = opts.centerGroupX - ((starOuter * 2 + gap + textWidth) / 2) + starOuter;
        }
        var textX = starCx + starOuter + gap;
        ctx.save();
        if (opts.starGlow) {
          ctx.shadowColor = opts.starGlow;
          ctx.shadowBlur = opts.starBlur || (starOuter * 2);
        }
        drawStar(starCx, centerY + (opts.starYOffset !== undefined ? opts.starYOffset : -1), starOuter, starInner);
        ctx.fillStyle = opts.starColor || (isTronTheme() ? TRON_STYLE.cyan : '#E8B84B');
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.fillStyle = opts.textColor || (isTronTheme() ? TRON_STYLE.text : '#7A6555');
        ctx.font = font;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(label, textX, centerY);
        ctx.restore();
      }

      function renderStars(x, y, count, maxStars, size) {
        var outerR = size, innerR = size * 0.4;
        var spacing = size * 2.5;
        var totalW = (maxStars - 1) * spacing;
        var startX = x - totalW / 2;
        for (var i = 0; i < maxStars; i++) {
          var sx = startX + i * spacing;
          if (isTronTheme() && i < count) {
            ctx.save();
            ctx.shadowColor = i === 0 ? TRON_STYLE.glowCyan : TRON_STYLE.glowAmber;
            ctx.shadowBlur = size * 2.8;
          }
          drawStar(sx, y, outerR, innerR);
          ctx.fillStyle = i < count ? (isTronTheme() ? (i % 2 === 0 ? TRON_STYLE.cyan : TRON_STYLE.amber) : '#E8B84B') : (isTronTheme() ? TRON_STYLE.muted : '#D4C8B8');
          ctx.fill();
          if (isTronTheme() && i < count) {
            ctx.restore();
          }
        }
      }

      function drawLock(cx, cy) {
        ctx.fillStyle = '#D4C8B8';
        drawRoundedRect(cx - 6, cy, 12, 10, 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, 6, Math.PI, 0, false);
        ctx.strokeStyle = '#D4C8B8';
        ctx.lineWidth = 2.5;
        ctx.stroke();
      }

      function renderTitleScreen(screenModule, progressModule) {
        var neonMode = isTronTheme();
        if (neonMode) {
          var titleBg = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
          titleBg.addColorStop(0, TRON_STYLE.backdropTop);
          titleBg.addColorStop(1, '#0c1324');
          ctx.fillStyle = titleBg;
        } else {
          ctx.fillStyle = '#FBF7F0';
        }
        drawBackdrop('title');

        ctx.save();
        ctx.fillStyle = neonMode ? TRON_STYLE.text : '#4A3728';
        ctx.font = neonMode ? '800 42px Orbitron, sans-serif' : 'bold 48px Nunito, sans-serif';
        if (neonMode) {
          ctx.shadowColor = TRON_STYLE.cyanShadow;
          ctx.shadowBlur = 24;
        }
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(neonMode ? 'TRON GRIDLOCK' : 'TRAFFIC JAM', CANVAS_WIDTH / 2, 188);
        ctx.restore();

        ctx.save();
        ctx.fillStyle = neonMode ? TRON_STYLE.amber : '#8B7462';
        ctx.font = neonMode ? '700 20px Orbitron, sans-serif' : 'bold 24px Nunito, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(neonMode ? 'CIRCUIT BREAKER PUZZLES' : 'PUZZLE', CANVAS_WIDTH / 2, 236);
        ctx.restore();

        if (neonMode) {
          ctx.save();
          ctx.fillStyle = 'rgba(215,251,255,0.78)';
          ctx.font = '600 22px Rajdhani, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('Thread glowing convoy blocks through the portal lane.', CANVAS_WIDTH / 2, 274);
          ctx.restore();
        }

        var carW = 160, carH = 60;
        var carX = (CANVAS_WIDTH - carW) / 2, carY = 388 - carH / 2;
        drawVehicle({
          type: 'primary',
          orientation: 'horizontal',
          length: 2,
          color: '#C45C4A'
        }, carX - VEHICLE_PADDING, carY - VEHICLE_PADDING, false, 1);

        var totalStars = screenModule ? screenModule.getTotalStars() : 0;
        renderStarCounter(CANVAS_WIDTH / 2 - 72, 470, totalStars + ' / 300', {
          centerGroupX: CANVAS_WIDTH / 2,
          starOuter: 12,
          starInner: 5,
          gap: 14,
          starGlow: neonMode ? TRON_STYLE.glowCyan : null,
          starBlur: 22,
          font: neonMode ? '700 22px Rajdhani, sans-serif' : '20px Nunito, sans-serif'

          gc2 = Math.max(dragBounds.min, Math.min(dragBounds.max, gc2));
          dragCurrentPixelX = br.x + gc2 * cellSize;
          dragCurrentPixelY = dragStartVehiclePixelY;
        } else {
          var dy = cy - dragStartPointerY;
          var npy = dragStartVehiclePixelY + dy;
          var gr2 = (npy - br.y) / cellSize;
          gr2 = Math.max(dragBounds.min, Math.min(dragBounds.max, gr2));
          dragCurrentPixelX = dragStartVehiclePixelX;
          dragCurrentPixelY = br.y + gr2 * cellSize;
        }
        var _slideCell = isH
          ? Math.floor((dragCurrentPixelX - br.x) / cellSize)
          : Math.floor((dragCurrentPixelY - br.y) / cellSize);
        _lastSlideCell = _slideCell;
      }

      function handlePointerUp() {
        if (!dragActive) return;
        var v = Board.getVehicleById(dragVehicleId);
        if (v) {
          var cellSize = Renderer.getCellSize();
          var br = Renderer.getBoardRect();
          var isH = v.orientation === 'horizontal';
          var newRow = v.row, newCol = v.col;
          if (isH) {
            var gc3 = Math.round((dragCurrentPixelX - br.x) / cellSize);
            gc3 = Math.max(dragBounds.min, Math.min(dragBounds.max, gc3));
            newCol = gc3;
          } else {
            var gr3 = Math.round((dragCurrentPixelY - br.y) / cellSize);
            gr3 = Math.max(dragBounds.min, Math.min(dragBounds.max, gr3));
            newRow = gr3;
          }

          // Start snap tween animation (Layer 3)
          var targetPos = Renderer.gridToCanvas(newRow, newCol);
          if (Math.abs(dragCurrentPixelX - targetPos.x) > 1 || Math.abs(dragCurrentPixelY - targetPos.y) > 1) {
            Anim.startSnapTween(dragVehicleId, dragCurrentPixelX, dragCurrentPixelY, targetPos.x, targetPos.y);
          }

          if (newRow !== dragStartRow || newCol !== dragStartCol) {
            if (callbacks.onMove) callbacks.onMove(dragVehicleId, newRow, newCol);
            window.playSound('vehicle_place');
          } else {
            // No move but may need to snap back visually
            var snapBack = Renderer.gridToCanvas(dragStartRow, dragStartCol);
            if (Math.abs(dragCurrentPixelX - snapBack.x) > 1 || Math.abs(dragCurrentPixelY - snapBack.y) > 1) {
              Anim.startSnapTween(dragVehicleId, dragCurrentPixelX, dragCurrentPixelY, snapBack.x, snapBack.y);
            }
          }
        }
        dragActive = false; dragVehicleId = -1;
        Board.setDraggingVehicleId(-1);
      }

      return {
        initInput: function(cvs, cbs) {
          canvas = cvs; callbacks = cbs;
          canvas.addEventListener('mousedown', function(e) { var p = screenToCanvas(e.clientX, e.clientY); handlePointerDown(p.x, p.y); });
          canvas.addEventListener('mousemove', function(e) { var p = screenToCanvas(e.clientX, e.clientY); handlePointerMove(p.x, p.y); });
          canvas.addEventListener('mouseup', function() { handlePointerUp(); });
          canvas.addEventListener('mouseleave', function() { handlePointerUp(); });
          canvas.addEventListener('touchstart', function(e) { e.preventDefault(); if(e.touches.length>0){var t=e.touches[0]; var p=screenToCanvas(t.clientX,t.clientY); handlePointerDown(p.x,p.y);} }, {passive:false});
          canvas.addEventListener('touchmove', function(e) { e.preventDefault(); if(e.touches.length>0){var t=e.touches[0]; var p=screenToCanvas(t.clientX,t.clientY); handlePointerMove(p.x,p.y);} }, {passive:false});
          canvas.addEventListener('touchend', function(e) { e.preventDefault(); handlePointerUp(); }, {passive:false});
          canvas.addEventListener('touchcancel', function(e) { e.preventDefault(); handlePointerUp(); }, {passive:false});
          document.addEventListener('keydown', function(e) {
            var scr = Screen.getCurrentScreen();
            if (e.code === 'Escape') {
              if (scr === 'gameplay' || scr === 'winOverlay') { Screen.goToLevelSelect(); }
              return;
            }
            // Arrow/WASD keys navigate to level select from title screen
            if (scr === 'title') {
              var navKeys = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD'];
              if (navKeys.indexOf(e.code) !== -1) {
                window.playSound('button_click');
                Screen.goToLevelSelect();
                return;
              }
            }
            if (scr !== 'gameplay') return;
            if (e.code === 'KeyU') { if (callbacks.onUndo) callbacks.onUndo(); }
            else if (e.code === 'KeyR') { if (callbacks.onRestart) callbacks.onRestart(); }
          });
          canvas.addEventListener('wheel', function(e) {
            if (Screen.getCurrentScreen() === 'levelSelect') {
              Screen.scrollLevelGrid(e.deltaY);
              e.preventDefault();
            }
          }, { passive: false });
        },
        getDragState: function() { return { active: dragActive, vehicleId: dragVehicleId, pixelX: dragCurrentPixelX, pixelY: dragCurrentPixelY }; }
      };
    })();

    // ═══════════════════════════════════════════════════════════════
    // SCREEN MODULE
    // ═══════════════════════════════════════════════════════════════
    var Screen = (function() {
      var currentScreen = 'title';
      var selectedTier = 1;
      var currentLevelId = 0;
      var scrollOffset = 0;

      function updateScreenEntity() {
        if (typeof Game !== 'undefined' && Game.updateEntities) Game.updateEntities();
      }

      return {
        getCurrentScreen: function() { return currentScreen; },
        getSelectedTier: function() { return selectedTier; },
        getCurrentLevelId: function() { return currentLevelId; },
        getScrollY: function() { return scrollOffset; },
        getTotalStars: function() { return Progress.getTotalStars(); },

        goToTitle: function() {
          Anim.startScreenTransition(function() {
            currentScreen = 'title';
            updateScreenEntity();
          });
        },

        goToLevelSelect: function() {
          window.playSound('level_select_open');
          Anim.startScreenTransition(function() {
            currentScreen = 'levelSelect';
            scrollOffset = 0;
            updateScreenEntity();
          });
        },

        startLevel: function(levelId) {
          var lvl = Progress.getLevelData(levelId);
          if (!lvl) return;
          Anim.startScreenTransition(function() {
            Anim.reset();
            Board.loadLevel(lvl);
            currentScreen = 'gameplay';
            currentLevelId = levelId;
            if (typeof Game !== 'undefined' && Game.syncHudState) Game.syncHudState();
            updateScreenEntity();
            Anim.startBoardEntrance();
          });
        },

        showWinOverlay: function() {
          currentScreen = 'winOverlay';
          var par = Board.getLevelPar();
          var moves = Board.getMoveCount();
          Progress.recordCompletion(currentLevelId, moves, par);
          updateScreenEntity();
        },

        advanceToNextLevel: function() {
          var nextId = Progress.getNextLevelId(currentLevelId);
          if (nextId !== null) {
            this.startLevel(nextId);
          } else {
            this.goToLevelSelect();
          }
        },

        setSelectedTier: function(tier) {
          selectedTier = tier;
          scrollOffset = 0;
          updateScreenEntity();
        },

        scrollLevelGrid: function(deltaY) {
          var tierLevels = Progress.getLevelsByTier(selectedTier);
          var rows = Math.ceil(tierLevels.length / 5);
          var maxScroll = Math.max(0, rows * 98 - 495);
          scrollOffset = Math.max(0, Math.min(maxScroll, scrollOffset + deltaY * 0.5));
        },

        handleClick: function(cx, cy) {
          if (currentScreen === 'title') {
            if (cx >= 150 && cx <= 390 && cy >= 548 && cy <= 604) {
              window.playSound('button_click');
              this.goToLevelSelect();
            }
            return;
          }

          if (currentScreen === 'levelSelect') {
            if (cx >= 10 && cx <= 50 && cy >= 10 && cy <= 50) {
              window.playSound('button_click');
              this.goToTitle();
              return;
            }
            var tabW = 145, tabH = 44, tabY = 72;
            var tabXs = [30, 195, 360];
            for (var t = 0; t < 3; t++) {
              if (cx >= tabXs[t] && cx <= tabXs[t] + tabW && cy >= tabY && cy <= tabY + tabH) {
                window.playSound('button_click');
                this.setSelectedTier(t + 1);
                return;
              }
            }
            var cols = 5, btnSize = 88, gap = 10;
            var gridW = cols * btnSize + (cols - 1) * gap;
            var gridOffX = (540 - gridW) / 2;
            var gridStartY = 165;
            var rowH = btnSize + gap;
            var tierLevels = Progress.getLevelsByTier(selectedTier);
            for (var li = 0; li < tierLevels.length; li++) {
              var colIdx = li % cols;
              var rowIdx = Math.floor(li / cols);
              var bx = gridOffX + colIdx * (btnSize + gap);
              var by = gridStartY + rowIdx * rowH - scrollOffset;
              if (cx >= bx && cx <= bx + btnSize && cy >= by && cy <= by + btnSize) {
                if (Progress.isLevelUnlocked(tierLevels[li].id)) {
                  window.playSound('button_click');
                  this.startLevel(tierLevels[li].id);
                }
                return;
              }
            }
            return;
          }

          if (currentScreen === 'winOverlay') {
            var cH = 340, cY2 = (720 - cH) / 2;
            var nlBtnW = 200, nlBtnH = 44;
            var nlBtnX = (540 - nlBtnW) / 2, nlBtnY = cY2 + 230;
            if (cx >= nlBtnX && cx <= nlBtnX + nlBtnW && cy >= nlBtnY && cy <= nlBtnY + nlBtnH) {
              window.playSound('button_click');
              var nextId = Progress.getNextLevelId(currentLevelId);
              if (nextId !== null) {
                this.advanceToNextLevel();
              } else {
                this.goToLevelSelect();
              }
              return;
            }
            var lsBtnY = cY2 + 286;
            if (cx >= nlBtnX && cx <= nlBtnX + nlBtnW && cy >= lsBtnY && cy <= lsBtnY + nlBtnH) {
              window.playSound('button_click');
              this.goToLevelSelect();
              return;
            }
            return;
          }
        },

        getScreenState: function() {
          return {
            currentScreen: currentScreen,
            selectedTier: selectedTier,
            unlockedLevels: {
              '1': Progress.getUnlockedCountForTier(1),
              '2': Progress.getUnlockedCountForTier(2),
              '3': Progress.getUnlockedCountForTier(3)
            },
            totalStars: Progress.getTotalStars(),
            currentLevelId: currentLevelId
          };
        },

        loadFromState: function(stateObj) {
          if (stateObj.currentScreen) currentScreen = stateObj.currentScreen;
          if (typeof stateObj.selectedTier === 'number') selectedTier = stateObj.selectedTier;
          if (typeof stateObj.currentLevelId === 'number') currentLevelId = stateObj.currentLevelId;
          if (typeof stateObj.totalStars === 'number') {
            Screen._injectedTotalStars = stateObj.totalStars;
          }
          if (stateObj.unlockedLevels) {
            Screen._injectedUnlockedLevels = stateObj.unlockedLevels;
          }
        },

        _injectedTotalStars: null,
        _injectedUnlockedLevels: null
      };
    })();

    // ═══════════════════════════════════════════════════════════════
    // PROGRESS MODULE
    // ═══════════════════════════════════════════════════════════════
    var Progress = (function() {
      var levelProgress = {};
      var STORAGE_KEY = 'traffic-jam-progress';

      return {
        load: function() {
          try {
            var raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
              var data = JSON.parse(raw);
              if (data && data.levels) levelProgress = data.levels;
            }
          } catch(e) {
            levelProgress = {};
          }
        },

        save: function() {
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ levels: levelProgress }));
          } catch(e) { /* ignore */ }
        },

        getStarsForLevel: function(levelId) {
          var entry = levelProgress[String(levelId)];
          return entry ? entry.stars : 0;
        },

        getBestMovesForLevel: function(levelId) {
          var entry = levelProgress[String(levelId)];
          return entry ? entry.bestMoves : null;
        },

        recordCompletion: function(levelId, moveCount, par) {
          var stars = 1;
          if (moveCount <= par) stars = 3;
          else if (moveCount <= par + 5) stars = 2;

          var key = String(levelId);
          var existing = levelProgress[key];
          if (!existing || stars > existing.stars || (stars === existing.stars && moveCount < existing.bestMoves)) {
            levelProgress[key] = { stars: Math.max(stars, existing ? existing.stars : 0), bestMoves: existing ? Math.min(moveCount, existing.bestMoves) : moveCount };
          }
          this.save();
          return stars;
        },

        getTotalStars: function() {
          if (Screen._injectedTotalStars !== null) return Screen._injectedTotalStars;
          var total = 0;
          for (var key in levelProgress) {
            if (levelProgress.hasOwnProperty(key)) total += levelProgress[key].stars;
          }
          return total;
        },

        getStarsForTier: function(tier) {
          var tierLevels = this.getLevelsByTier(tier);
          var earned = 0;
          for (var i = 0; i < tierLevels.length; i++) {
            earned += this.getStarsForLevel(tierLevels[i].id);
          }
          return { earned: earned, max: tierLevels.length * 3 };
        },

        isLevelUnlocked: function(levelId) {
          if (Screen._injectedUnlockedLevels !== null) {
            var lvlData = this.getLevelData(levelId);
            if (!lvlData) return false;
            var tier = lvlData.tier;
            var tierLevels = this.getLevelsByTier(tier);
            var idx = -1;
            for (var i = 0; i < tierLevels.length; i++) {
              if (tierLevels[i].id === levelId) { idx = i; break; }
            }
            if (idx === -1) return false;
            var unlockedCount = Screen._injectedUnlockedLevels[String(tier)] || 0;
            return idx < unlockedCount;
          }

          var lvlData2 = this.getLevelData(levelId);
          if (!lvlData2) return false;
          if (lvlData2.tier === 1) return true;
          var tierLevels2 = this.getLevelsByTier(lvlData2.tier);
          for (var j = 0; j < tierLevels2.length; j++) {
            if (tierLevels2[j].id === levelId) {
              if (j === 0) return true;
              return this.getStarsForLevel(tierLevels2[j - 1].id) > 0;
            }
          }
          return false;
        },

        getUnlockedCountForTier: function(tier) {
          if (Screen._injectedUnlockedLevels !== null) {
            return Screen._injectedUnlockedLevels[String(tier)] || 0;
          }

          if (tier === 1) return 40;
          var tierLevels = this.getLevelsByTier(tier);
          var count = 1;
          for (var i = 0; i < tierLevels.length - 1; i++) {
            if (this.getStarsForLevel(tierLevels[i].id) > 0) {
              count++;
            } else {
              break;
            }
          }
          return Math.min(count, tierLevels.length);
        },

        getLevelsByTier: function(tier) {
          var result = [];
          for (var i = 0; i < LEVELS_DATA.length; i++) {
            if (LEVELS_DATA[i].tier === tier) result.push(LEVELS_DATA[i]);
          }
          result.sort(function(a, b) { return a.id - b.id; });
          return result;
        },

        getNextLevelId: function(currentLevelId) {
          var lvl = this.getLevelData(currentLevelId);
          if (!lvl) return null;
          var tierLevels = this.getLevelsByTier(lvl.tier);
          for (var i = 0; i < tierLevels.length; i++) {
            if (tierLevels[i].id === currentLevelId) {
              if (i + 1 < tierLevels.length) return tierLevels[i + 1].id;
              return null;
            }
          }
          return null;
        },

        getLevelData: function(levelId) {
          for (var i = 0; i < LEVELS_DATA.length; i++) {
            if (LEVELS_DATA[i].id === levelId) return LEVELS_DATA[i];
          }
          return null;
        }
      };
    })();

    // ═══════════════════════════════════════════════════════════════
    // MAIN
    // ═══════════════════════════════════════════════════════════════
    var CANVAS_W = 540, CANVAS_H = 720;
    var canvasDeviceScale = 1;
    var cvs = document.createElement('canvas');
    cvs.width = CANVAS_W; cvs.height = CANVAS_H;
    document.body.appendChild(cvs);
    var context = cvs.getContext('2d');

    function resizeCanvas() {
      var sx = window.innerWidth / CANVAS_W, sy = window.innerHeight / CANVAS_H;
      var s = Math.min(sx, sy);
      var dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 3));
      canvasDeviceScale = dpr;
      cvs.width = Math.floor(CANVAS_W * dpr);
      cvs.height = Math.floor(CANVAS_H * dpr);
      cvs.style.width = (CANVAS_W * s) + 'px';
      cvs.style.height = (CANVAS_H * s) + 'px';
      context.setTransform(dpr, 0, 0, dpr, 0, 0);
      context.imageSmoothingEnabled = true;
      context.imageSmoothingQuality = 'high';
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    Hud.initHud();
    Renderer.initRenderer(cvs, context);

    // Load progress from localStorage
    Progress.load();

    // Start on title screen (don't auto-load a level)
    Screen.goToTitle();

    function syncHudState() {
      var mc = Board.getMoveCount();
      var ul = Board.getUndoStack().length;
      Hud.setMoveCount(mc);
      Hud.setButtonEnabled('undo', ul > 0);
      Hud.setButtonEnabled('restart', mc > 0);
      var tierNames = ['Sector 01', 'Sector 02', 'Sector 03'];
      var tierLevels = Progress.getLevelsByTier(Board.getLevelTier());
      var indexInTier = -1;
      var currentId = (typeof Screen !== 'undefined' && Screen.getCurrentLevelId()) ? Screen.getCurrentLevelId() : Board.getLevelId();
      for (var i = 0; i < tierLevels.length; i++) {
        if (tierLevels[i].id === currentId) { indexInTier = i; break; }
      }
      if (indexInTier >= 0) {
        Hud.setLevelLabel(tierNames[Board.getLevelTier() - 1] + ' #' + (indexInTier + 1));
      } else {
        Hud.setLevelLabel(tierNames[Board.getLevelTier() - 1] + ' #1');
      }
    }

    var GS = window.__GAME_STATE__;

    var Game = {
      syncHudState: function() { syncHudState(); },
      updateEntities: function() { updateEntities(); }
    };

    function updateEntities() {
      if (GS) {
        GS.updateEntity('board', Board.getBoardState());
        GS.updateEntity('hud', Hud.getHudState());
        GS.updateEntity('screen', Screen.getScreenState());
      }
    }

    function onMove(vid, nr, nc) {
      var moved = Board.applyMove(vid, nr, nc);
      if (moved) {
        syncHudState();
        updateEntities();
        // Move counter bump animation (Layer 3)
        Anim.triggerMoveCountBump();
        if (Board.isWon()) {
          window.playSound('win_exit');
          // Layer 3: start win animation sequence instead of immediately showing overlay
          var pCar = Board.getVehicleById(0);
          var pPos = Renderer.gridToCanvas(pCar.row, pCar.col);
          var cs = Renderer.getCellSize();
          // Calculate stars for the win
          var par = Board.getLevelPar();
          var moves = Board.getMoveCount();
          var starsEarned = 1;
          if (moves <= par) starsEarned = 3;
          else if (moves <= par + 5) starsEarned = 2;
          Anim.startWinSequence(pPos.x, pPos.y, cs * pCar.length, cs, function() {
            Screen.showWinOverlay();
          }, starsEarned);
        }
      }
    }
    function onUndo() { var u = Board.undo(); if(u){ window.playSound('undo'); syncHudState(); updateEntities();} }
    function onRestart() {
      if (Board.getMoveCount() > 0 || Board.isWon()) {
        window.playSound('restart');
        Board.restart();
        syncHudState();
        updateEntities();
        Anim.reset();
        Anim.startBoardEntrance();
      }
    }

    Input.initInput(cvs, {
      onMove: onMove,
      onUndo: onUndo,
      onRestart: onRestart,
      onBack: function() { Screen.goToLevelSelect(); }
    });

    // Register entities
    if (GS) {
      GS.registerEntity('board', Board.getBoardState());
      GS.registerEntity('hud', Hud.getHudState());
      GS.registerEntity('screen', Screen.getScreenState());
      GS.onLoadState = function(loadedState) {
        if (loadedState && loadedState.entities) {
          var ents = loadedState.entities;

          // Reset Anim state on any load
          Anim.reset();

          if (ents.screen) {
            Screen._injectedTotalStars = null;
            Screen._injectedUnlockedLevels = null;
            Screen.loadFromState(ents.screen);

            if (ents.screen.currentScreen === 'gameplay' || ents.screen.currentScreen === 'winOverlay') {
              if (ents.screen.currentLevelId && !ents.board) {
                var lvl = Progress.getLevelData(ents.screen.currentLevelId);
                if (lvl) {
                  Board.loadLevel(lvl);
                  syncHudState();
                }
              }
            }
          }

          if (ents.board) {
            Board.loadFromState(ents.board);
            syncHudState();
          }

          if (ents.hud) {
            if (ents.hud.levelLabel !== undefined) Hud.setLevelLabel(ents.hud.levelLabel);
            if (ents.hud.moveCount !== undefined) Hud.setMoveCount(ents.hud.moveCount);
            if (typeof ents.hud.undoEnabled === 'boolean') Hud.setButtonEnabled('undo', ents.hud.undoEnabled);
            if (typeof ents.hud.restartEnabled === 'boolean') Hud.setButtonEnabled('restart', ents.hud.restartEnabled);
          }

          updateEntities();
        }
      };
      GS.start();
    }

    // Game loop with dt tracking (Layer 3)
    var running = true;
    var lastFrameTime = Date.now();
    function gameLoop() {
      if (!running) return;
      var currentTime = Date.now();
      var dt = (currentTime - lastFrameTime) / 1000;
      lastFrameTime = currentTime;
      if (dt > 0.1) dt = 0.1;
      if (GS) GS.tick();
      Anim.update(dt);
      var effectiveTickInterval = window.__FAST_TICK__ || 16;
      if (!window.__FAST_TICK__) {
        Renderer.render(Board, Hud, Input.getDragState(), Screen, Progress);
      }
      requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);
  })();
  </script>
